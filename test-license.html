<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test License Integration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h4>Test License Integration</h4>
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label for="licenseCode" class="form-label">Kode Lisensi</label>
                <input
                  type="text"
                  class="form-control"
                  id="licenseCode"
                  placeholder="Masukkan kode lisensi dari admin app"
                />
              </div>
              <button type="button" class="btn btn-primary" onclick="testLicense()">
                Test Verifikasi
              </button>
              <div id="result" class="mt-3"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { createClient } from 'https://cdn.skypack.dev/@supabase/supabase-js';

      // Setup Supabase client
      const supabaseUrl = 'YOUR_SUPABASE_URL'; // ganti dengan URL sebenarnya
      const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'; // ganti dengan key sebenarnya

      // Temporary test untuk memastikan struktur berfungsi
      window.testLicense = async function () {
        const licenseCode = document.getElementById('licenseCode').value;
        const resultDiv = document.getElementById('result');

        if (!licenseCode) {
          resultDiv.innerHTML = '<div class="alert alert-warning">Masukkan kode lisensi</div>';
          return;
        }

        resultDiv.innerHTML =
          '<div class="alert alert-info">Testing license: ' + licenseCode + '</div>';

        // TODO: Implementasi test real dengan Supabase RPC
        console.log('Testing license:', licenseCode);
      };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
